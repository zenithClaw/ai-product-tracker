name: Daily AI Tracker Update

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨运行
  workflow_dispatch: # 手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install requests beautifulsoup4
        
      - name: Run Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_tracker.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "Antigravity 🐛"
          git config --global user.email "bot@openclaw.ai"
          git add .
          git commit -m "chore: daily update AI products & OpenClaw Insider" || echo "No changes to commit"
          git push
