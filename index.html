<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Picks — Daily Curated AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080810;
      --surface: #0e0e1a;
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #f0f0f8;
      --text-secondary: #8888aa;
      --text-muted: #44445a;
      --accent: #7c6af7;
      --accent-dim: rgba(124,106,247,0.12);
      --accent-glow: rgba(124,106,247,0.25);
      --tag-os-bg: rgba(99,190,255,0.1);
      --tag-os-text: #63beff;
      --tag-saas-bg: rgba(255,170,99,0.1);
      --tag-saas-text: #ffaa63;
      --tag-tool-bg: rgba(99,255,170,0.1);
      --tag-tool-text: #63ffaa;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .container { max-width: 780px; margin: 0 auto; padding: 0 24px; }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 32px 0 24px;
    }

    .header-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wordmark-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .header-meta {
      text-align: right;
    }

    .issue-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .issue-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      margin-top: 2px;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 8px;
      font-weight: 400;
    }

    /* ── Nav / Filters ── */
    .nav-bar {
      border-bottom: 1px solid var(--border);
      padding: 0;
      position: sticky;
      top: 0;
      background: rgba(8,8,16,0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      z-index: 10;
    }

    .nav-inner {
      display: flex;
      align-items: center;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav-inner::-webkit-scrollbar { display: none; }

    .nav-tab {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    .nav-tab:hover { color: var(--text-secondary); }

    .nav-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--accent);
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── Issue selector ── */
    .issue-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 0 8px;
    }

    .issue-nav-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-right: 4px;
    }

    .issue-pill {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .issue-pill:hover {
      border-color: var(--border-hover);
      color: var(--text-secondary);
    }

    .issue-pill.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Main ── */
    main { padding: 24px 0 64px; }

    .picks-list { display: flex; flex-direction: column; gap: 12px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: default;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: none;
    }

    .card.visible { display: block; }

    .card:hover {
      border-color: var(--border-hover);
      box-shadow: 0 4px 32px rgba(0,0,0,0.3);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }

    .card-tags { display: flex; gap: 6px; flex-wrap: wrap; }

    .tag {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 0.02em;
    }

    .tag-os   { background: var(--tag-os-bg);   color: var(--tag-os-text); }
    .tag-saas { background: var(--tag-saas-bg);  color: var(--tag-saas-text); }
    .tag-tool { background: var(--tag-tool-bg);  color: var(--tag-tool-text); }
    .tag-hot  { background: rgba(255,80,80,0.1); color: #ff7070; }

    .card-stars {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .stars-delta {
      color: #63ffaa;
      font-size: 11px;
    }

    .card-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.65;
      margin-bottom: 14px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .card-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-link {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .card-link:hover { opacity: 0.75; }

    .card-link svg { width: 12px; height: 12px; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 64px 0;
      color: var(--text-muted);
      display: none;
    }
    .empty.visible { display: block; }
    .empty-title { font-size: 15px; margin-bottom: 8px; color: var(--text-secondary); }
    .empty-sub { font-size: 13px; }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .footer-left {
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-link {
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--text-secondary); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .header-inner { flex-direction: column; gap: 8px; }
      .header-meta { text-align: left; }
      .card-footer { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>

// ── State ─────────────────────────────────────────────────────────────────────
let currentIssue = ISSUES[ISSUES.length - 1].id;
let currentFilter = "all";

// ── Render ────────────────────────────────────────────────────────────────────
function tagLabel(t) {
  if (t === "open-source") return "Open Source";
  if (t === "saas") return "SaaS";
  if (t === "tool") return "Tool";
  if (t === "hot") return "Trending";
  return t;
}

function tagClass(t) {
  if (t === "open-source") return "tag tag-os";
  if (t === "saas") return "tag tag-saas";
  if (t === "tool") return "tag tag-tool";
  if (t === "hot") return "tag tag-hot";
  return "tag";
}

function renderIssueNav() {
  const nav = document.getElementById("issueNav");
  const label = document.createElement("span");
  label.className = "issue-nav-label";
  label.textContent = "Issue";
  nav.innerHTML = "";
  nav.appendChild(label);

  ISSUES.slice().reverse().forEach(issue => {
    const btn = document.createElement("button");
    btn.className = "issue-pill" + (issue.id === currentIssue ? " active" : "");
    btn.textContent = `#${issue.id} · ${issue.date}`;
    btn.addEventListener("click", () => {
      currentIssue = issue.id;
      renderAll();
    });
    nav.appendChild(btn);
  });
}

function renderCards() {
  const issue = ISSUES.find(i => i.id === currentIssue);
  const list = document.getElementById("picksList");
  const empty = document.getElementById("emptyState");
  const header = document.getElementById("headerDate");

  header.textContent = issue.date;
  list.innerHTML = "";

  const filtered = issue.picks.filter(p =>
    currentFilter === "all" || p.tags.includes(currentFilter)
  );

  if (filtered.length === 0) {
    empty.classList.add("visible");
    return;
  }
  empty.classList.remove("visible");

  filtered.forEach(pick => {
    const card = document.createElement("article");
    card.className = "card visible";

    const tagsHTML = pick.tags.map(t =>
      `<span class="${tagClass(t)}">${tagLabel(t)}</span>`
    ).join("");

    card.innerHTML = `
      <div class="card-header">
        <div>
          <div class="card-title-row">
            <span class="card-name">${pick.name}</span>
            <div class="card-tags">${tagsHTML}</div>
          </div>
        </div>
        <div class="card-stars">
          <span>${pick.stars}</span>
          <span class="stars-delta">${pick.delta}</span>
        </div>
      </div>
      <p class="card-desc">${pick.desc}</p>
      <div class="card-footer">
        <div class="card-meta">
          <span>${pick.lang}</span>
        </div>
        <a class="card-link" href="${pick.url}" target="_blank" rel="noopener">
          View on GitHub
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2.5 9.5l7-7M9.5 9V2.5H3"/>
          </svg>
        </a>
      </div>
    `;
    list.appendChild(card);
  });
}

function renderAll() {
  renderIssueNav();
  renderCards();

  // update filter tabs active state
  document.querySelectorAll(".nav-tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.filter === currentFilter);
  });
}

// ── Events ────────────────────────────────────────────────────────────────────
document.querySelectorAll(".nav-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    currentFilter = tab.dataset.filter;
    renderAll();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
